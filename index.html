<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ZoneIn</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23ffffff'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,Arial,sans-serif' font-weight='900' font-size='20' fill='%23000000'%3EZ%3C/text%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  :root {
    --bg-deep:#0a0a0a; --bg-card:#111111; --bg-surface:#181818; --bg-hover:#202020;
    --border:#2a2a2a; --border-light:#3a3a3a; --border-accent:rgba(255,255,255,0.3);
    --text-primary:#ffffff; --text-secondary:#888888; --text-muted:#444444;
    --accent:#ffffff; --accent-light:#f0f0f0; --accent-bg:rgba(255,255,255,0.06);
    --accent-bg-strong:rgba(255,255,255,0.12);
    --green:#00c28e; --green-bg:rgba(0,194,142,0.1); --green-border:rgba(0,194,142,0.4);
    --red:#ff4444; --red-bg:rgba(255,68,68,0.1);
    --shadow-accent:rgba(255,255,255,0.15);
    --shadow-green:rgba(0,194,142,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }
  html, body { height:100%; overflow:hidden; }
  body {
    height:100vh; background:var(--bg-deep);
    color:var(--text-primary); font-family:'Inter',-apple-system,sans-serif;
    display:flex; flex-direction:column;
  }
  @keyframes slideDown { from{opacity:0;transform:translate(-50%,-20px)} to{opacity:1;transform:translate(-50%,0)} }
  @keyframes pulse-border { 0%,100%{border-color:var(--green-border)} 50%{border-color:var(--green)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes notifSlideIn { from{opacity:0;transform:translateY(30px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }

  /* Login screen styles */
  .login-screen {
    position: fixed;
    inset: 0;
    background: var(--bg-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .login-screen.hidden {
    display: none;
  }
  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    padding: 40px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 6px 6px 0px var(--accent);
  }
  .login-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .login-icon {
    width: 48px;
    height: 48px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 900;
    color: #000;
    box-shadow: 4px 4px 0px #000;
  }
  .login-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }
  .login-title span {
    color: var(--text-secondary);
  }
  .login-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    margin-bottom: 28px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .login-view-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .login-view-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .login-text-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 12px;
    display: block;
    width: 100%;
    text-align: center;
    transition: color 0.15s;
    padding: 4px 0;
  }
  .login-text-btn:hover { color: var(--accent); }
  .login-tabs {
    display: flex;
    gap: 0;
    background: transparent;
    padding: 0;
    border: 1px solid var(--border-light);
    margin-bottom: 20px;
  }
  .login-tab {
    flex: 1;
    padding: 9px 0;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 800;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
    font-family: inherit;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .login-tab.active {
    background: var(--accent);
    color: #000;
  }
  .login-field {
    margin-bottom: 12px;
    text-align: left;
  }
  .login-field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 5px;
    letter-spacing: 0.3px;
  }
  .login-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border-light);
    background: var(--bg-surface);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus {
    border-color: var(--accent);
    box-shadow: 3px 3px 0px var(--accent);
  }
  .login-input::placeholder {
    color: var(--text-muted);
  }
  .login-error {
    font-size: 12px;
    color: var(--red);
    margin-bottom: 10px;
    min-height: 16px;
    text-align: left;
  }
  .login-button {
    width: 100%;
    padding: 13px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #000;
    font-size: 14px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 4px 4px 0px #000;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .login-button:hover {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0px #000;
  }
  .login-button:active {
    transform: translate(4px, 4px);
    box-shadow: 0px 0px 0px #000;
  }
  .login-button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: 4px 4px 0px #000;
  }
  .login-loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(26,20,16,0.3);
    border-top-color: var(--bg-deep);
    border-radius: 50% !important;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* User avatar + dropdown */
  .user-section {
    position: relative;
    display: flex;
    align-items: center;
  }
  .user-avatar {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 900;
    color: #000;
    cursor: pointer;
    user-select: none;
    box-shadow: 3px 3px 0px #000;
    transition: all 0.1s;
    letter-spacing: 0.5px;
  }
  .user-avatar:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0px #000; }
  .user-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 200px;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    box-shadow: 4px 4px 0px var(--accent);
    z-index: 500;
    overflow: hidden;
    display: none;
    animation: fadeIn 0.15s ease-out;
  }
  .user-dropdown.open { display: block; }
  .user-dropdown-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
  }
  .user-dropdown-email {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 700;
    word-break: break-all;
    letter-spacing: 0.3px;
  }
  .user-dropdown-item {
    width: 100%;
    padding: 10px 14px;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.12s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .user-dropdown-item:hover { background: var(--accent); color: #000; }

  .app { flex:1; display:flex; flex-direction:column; max-width:700px; width:100%; margin:0 auto; min-height:0; overflow:hidden; }

  .toast {
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:var(--accent); color:#000;
    padding:10px 16px 10px 20px; font-size:13px; font-weight:800;
    border:1px solid #000; box-shadow:3px 3px 0px #000; z-index:1000;
    animation:slideDown 0.3s ease-out; display:none;
    letter-spacing:0.5px; text-transform:uppercase;
    cursor:pointer; align-items:center; gap:10px;
  }
  .toast.show { display:flex; }
  .toast-close {
    font-size:14px; font-weight:900; line-height:1;
    opacity:0.6; flex-shrink:0;
  }
  .toast-close:hover { opacity:1; }

  /* Header */
  .header { padding:10px 14px 0; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; border-bottom:1px solid var(--border); padding-bottom:10px; }
  .logo { display:flex; align-items:center; gap:8px; }
  .logo-icon {
    width:32px; height:32px; background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:900; color:#000;
    box-shadow:3px 3px 0px #000;
  }
  .logo-text { font-size:20px; font-weight:900; color:var(--text-primary); letter-spacing:-0.5px; }
  .logo-text span { color:var(--text-secondary); }

  /* Nav tabs */
  .nav-tabs { display:flex; gap:0; background:transparent; padding:0; border:1px solid var(--border-light); }
  .nav-tab {
    padding:6px 16px; border:none; cursor:pointer;
    font-size:11px; font-weight:800; background:transparent; color:var(--text-muted);
    transition:all 0.15s; font-family:inherit; letter-spacing:1px; text-transform:uppercase;
  }
  .nav-tab.active { background:var(--accent); color:#000; }
  .nav-tab:hover:not(.active) { color:var(--text-primary); background:var(--bg-hover); }

  /* Calendar card */
  .cal-card {
    flex:1; margin:8px 10px 0; background:var(--bg-card);
    border:1px solid var(--border); display:flex; flex-direction:column;
    overflow:hidden; min-height:0;
  }
  .cal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .cal-title { font-size:13px; font-weight:800; color:var(--text-primary); letter-spacing:1px; text-transform:uppercase; }
  .cal-nav-group { display:flex; gap:4px; align-items:center; }
  .cal-nav {
    background:none; border:1px solid var(--border-light); color:var(--accent);
    width:28px; height:28px; cursor:pointer; font-size:14px;
    font-family:inherit; display:flex; align-items:center; justify-content:center; transition:all 0.1s;
  }
  .cal-nav:hover { background:var(--accent); color:#000; border-color:var(--accent); }
  .cal-today-btn {
    background:none; border:1px solid var(--border-light); color:var(--accent);
    height:28px; cursor:pointer; font-size:10px; font-weight:800;
    font-family:inherit; padding:0 10px; transition:all 0.1s; letter-spacing:1px; text-transform:uppercase;
  }
  .cal-today-btn:hover { background:var(--accent); color:#000; border-color:var(--accent); }

  /* Day column headers */
  .cal-day-headers {
    display:grid; grid-template-columns:36px repeat(3,1fr); gap:0;
    border-bottom:1px solid var(--border); padding:4px 0; flex-shrink:0;
  }
  .cal-day-hdr { text-align:center; font-size:11px; font-weight:600; color:var(--text-secondary); border-left:1px solid var(--border); }
  .cal-day-hdr:first-child { border:none; }
  .cal-day-hdr.today-hdr { color:var(--accent); }

  /* Timeline */
  .cal-scroll { flex:1; overflow-y:auto; position:relative; }
  .cal-time-row {
    display:grid; grid-template-columns:36px repeat(3,1fr); gap:0;
    height:9px; min-height:9px; max-height:9px; border-top:1px solid transparent; overflow:visible;
  }
  .cal-time-row.hour-row { border-top:1px solid var(--border); }
  .cal-time-row.quarter-row { border-top:1px solid rgba(61,51,40,0.4); }
  .cal-time-label { font-size:8px; color:var(--text-muted); padding:1px 3px 0 0; text-align:right; white-space:nowrap; }
  .cal-time-label.hour-label { font-size:9px; color:var(--text-secondary); font-weight:600; }
  .cal-slot {
    border-left:1px solid rgba(255,255,255,0.04); height:9px; min-height:9px; max-height:9px;
    cursor:pointer; transition:background 0.1s; position:relative; overflow-x:clip; overflow-y:visible; padding:0;
  }
  .cal-slot:hover { background:var(--accent-bg); }
  .cal-slot.past-slot { opacity:0.3; cursor:default; }
  .cal-slot.past-slot:hover { background:transparent; }
  .session-block { opacity:1 !important; cursor:pointer !important; }

  /* Session blocks */
  .session-block {
    padding:4px 6px; font-size:9px; font-weight:700;
    position:absolute; top:0; left:1px; width:calc(100% - 2px); overflow:hidden;
    cursor:pointer; transition:all 0.1s; z-index:8;
  }
  .session-block.booked {
    background:var(--accent-bg-strong); border:1px solid var(--accent); color:var(--accent);
    box-shadow:2px 2px 0px var(--accent);
  }
  .session-block.active {
    background:var(--green-bg); border:1px solid var(--green); color:var(--green);
    box-shadow:2px 2px 0px var(--green); animation:pulse-border 2s infinite;
  }
  .session-block.completed {
    background:var(--bg-surface); border:1px solid var(--border-light); color:var(--text-muted);
  }
  .session-actions { position:absolute; top:3px; right:3px; display:flex; gap:2px; z-index:10; }
  .session-action-btn {
    width:20px; height:20px; border:1px solid var(--border-light);
    background:var(--bg-deep); color:var(--text-secondary); cursor:pointer; font-size:10px;
    display:flex; align-items:center; justify-content:center; transition:all 0.1s;
    font-family:inherit; padding:0;
  }
  .session-action-btn:hover { background:var(--accent); color:#000; border-color:var(--accent); }
  .session-action-btn.x-btn:hover { background:var(--red); color:#fff; border-color:var(--red); }

  /* Inline popups */
  .slot-popup {
    position:absolute; top:0; left:0; width:100%; z-index:20;
    background:var(--bg-card); border:1px solid var(--accent);
    padding:5px; display:flex; flex-direction:column; gap:4px;
    box-shadow:3px 3px 0px var(--accent); justify-content:center; align-items:stretch;
  }
  .slot-popup-btn {
    flex:1; padding:7px 4px; border:none; cursor:pointer;
    font-size:11px; font-weight:800; font-family:inherit; transition:all 0.1s; letter-spacing:0.5px; text-transform:uppercase;
  }
  .slot-popup-btn.book { background:var(--accent); color:#000; }
  .slot-popup-btn.book:hover { filter:brightness(1.1); }
  .slot-popup-btn.clear { background:var(--bg-surface); color:var(--text-secondary); border:1px solid var(--border); }
  .slot-popup-btn.clear:hover { background:var(--bg-hover); }

  .cancel-popup {
    position:absolute; top:0; left:1px; width:calc(100% - 2px); z-index:20;
    background:var(--bg-deep); border:1px solid var(--red);
    padding:5px; display:flex; flex-direction:column; gap:4px;
    box-shadow:3px 3px 0px var(--red);
  }
  .cancel-popup-btn {
    flex:1; padding:7px 4px; border:none; cursor:pointer;
    font-size:11px; font-weight:800; font-family:inherit; transition:all 0.1s; letter-spacing:0.5px; text-transform:uppercase;
  }
  .cancel-popup-btn.keep { background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border); }
  .cancel-popup-btn.keep:hover { background:var(--bg-hover); }
  .cancel-popup-btn.cancel-confirm { background:var(--red); color:#fff; }
  .cancel-popup-btn.cancel-confirm:hover { filter:brightness(1.1); }

  /* Now line */
  .now-line { position:absolute; left:36px; right:0; height:1px; background:var(--accent); z-index:5; pointer-events:none; }
  .now-dot { position:absolute; left:30px; width:7px; height:7px; background:var(--accent); z-index:6; transform:translateY(-3px); pointer-events:none; }
  .now-time-label { position:absolute; left:0; font-size:8px; color:var(--accent); font-weight:800; transform:translateY(-5px); pointer-events:none; z-index:6; letter-spacing:0.5px; }

  /* Bottom bar */
  .bottom-bar {
    padding:8px 12px; margin:0 auto; max-width:700px; width:100%;
    display:flex; flex-direction:column; gap:6px;
    background:var(--bg-card); border-top:1px solid var(--border);
    flex-shrink:0;
  }
  .duration-row { display:flex; gap:6px; align-items:center; }
  .dur-label { font-size:10px; color:var(--text-muted); font-weight:800; margin-right:4px; white-space:nowrap; letter-spacing:1px; text-transform:uppercase; }
  .dur-btn {
    flex:1; padding:6px 0; border:1px solid var(--border);
    background:var(--bg-surface); cursor:pointer; text-align:center;
    font-size:13px; font-weight:800; font-family:inherit; color:var(--text-secondary); transition:all 0.1s;
    border-radius: 999px !important;
  }
  .dur-btn:hover:not(.active) { border-color:var(--border-light); color:var(--text-primary); }
  .dur-btn.active { background:var(--accent); border-color:var(--accent); color:#000; box-shadow:3px 3px 0px #000; }
  .dur-btn.active:hover { transform:translate(1px,1px); box-shadow:2px 2px 0px #000; }
  .dur-btn span { font-size:9px; font-weight:700; display:block; color:inherit; opacity:0.7; }
  .book-bar-btn {
    width:100%; padding:10px; border:1px solid var(--accent); cursor:pointer;
    font-size:13px; font-weight:800; font-family:inherit; color:#000;
    background:var(--accent); box-shadow:4px 4px 0px #000; transition:all 0.1s;
    letter-spacing:0.5px; text-transform:uppercase;
  }
  .book-bar-btn:hover { transform:translate(2px,2px); box-shadow:2px 2px 0px #000; }
  .book-bar-btn:active { transform:translate(4px,4px); box-shadow:0px 0px 0px #000; }
  .book-bar-btn:disabled { opacity:0.25; cursor:default; transform:none; box-shadow:4px 4px 0px #000; background:var(--bg-surface); color:var(--text-muted); border-color:var(--border); }
  .book-bar-btn .bolt { display:inline-block; margin-right:6px; }

  /* Stats page */
  .stats-page { flex:1; padding:10px 10px 12px; overflow-y:auto; animation:fadeIn 0.2s ease-out; min-height:0; }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
  .stat-card { background:var(--bg-card); padding:12px; border:1px solid var(--border); box-shadow:3px 3px 0px #000; }
  .stat-value { font-size:24px; font-weight:900; color:var(--text-primary); }
  .stat-label { font-size:9px; color:var(--text-muted); margin-top:2px; letter-spacing:1.5px; text-transform:uppercase; font-weight:800; }
  .stat-card.wide { grid-column:1/-1; }
  .streak-bar { display:flex; gap:3px; margin-top:6px; }
  .streak-day {
    flex:1; height:24px; display:flex; align-items:center; justify-content:center;
    font-size:8px; font-weight:700;
  }
  .streak-day.done { background:var(--accent); color:#000; }
  .streak-day.empty { background:var(--bg-surface); color:var(--text-muted); border:1px solid var(--border); }
  .streak-day.today { border:1px solid var(--accent); }
  .weekly-chart { display:flex; align-items:flex-end; gap:4px; height:60px; margin-top:8px; }
  .weekly-bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .weekly-bar { width:100%; background:var(--accent); transition:height 0.3s; }
  .weekly-bar-label { font-size:8px; color:var(--text-muted); font-weight:700; letter-spacing:0.5px; }
  .weekly-bar-val { font-size:9px; color:var(--text-secondary); font-weight:700; }

  /* Tags page */
  .tags-page { flex:1; padding:10px 10px 12px; overflow-y:auto; animation:fadeIn 0.2s ease-out; min-height:0; display:flex; flex-direction:column; gap:10px; }
  .tags-section { background:var(--bg-card); border:1px solid var(--border); padding:14px; box-shadow:3px 3px 0px #000; }
  .tags-section-title { font-size:11px; font-weight:800; color:var(--text-muted); margin-bottom:10px; letter-spacing:1.5px; text-transform:uppercase; }
  .tag-list { display:flex; flex-direction:column; gap:4px; }
  .tag-item {
    display:flex; align-items:center; gap:10px; padding:10px 12px;
    background:var(--bg-surface); border:1px solid var(--border); transition:all 0.12s;
  }
  .tag-item:hover { border-color:var(--accent); box-shadow:2px 2px 0px var(--accent); }
  .tag-item-color { width:10px; height:10px; flex-shrink:0; }
  .tag-item-name { flex:1; font-size:13px; font-weight:700; color:var(--text-primary); }
  .tag-item-count { font-size:11px; color:var(--text-muted); font-weight:700; margin-right:4px; letter-spacing:0.5px; }
  .tag-item-del {
    width:24px; height:24px; border:1px solid var(--border);
    background:transparent; color:var(--text-muted); cursor:pointer; font-size:11px;
    display:flex; align-items:center; justify-content:center; transition:all 0.12s; padding:0; font-family:inherit;
  }
  .tag-item-del:hover { background:var(--red); color:#fff; border-color:var(--red); box-shadow:2px 2px 0px #000; }
  .tags-empty { text-align:center; padding:20px 0; color:var(--text-muted); font-size:12px; letter-spacing:1px; text-transform:uppercase; font-weight:700; }
  .add-tag-row { display:flex; gap:6px; align-items:center; }
  .add-tag-input {
    flex:1; padding:10px 12px; border:1px solid var(--border-light);
    background:var(--bg-surface); color:var(--text-primary); font-size:13px; font-family:inherit;
    outline:none; transition:all 0.15s;
  }
  .add-tag-input:focus { border-color:var(--accent); box-shadow:3px 3px 0px var(--accent); }
  .add-tag-input::placeholder { color:var(--text-muted); }
  .add-tag-btn {
    padding:10px 18px; border:1px solid var(--accent); cursor:pointer;
    background:var(--accent); color:#000;
    font-size:12px; font-weight:800; font-family:inherit; transition:all 0.1s; white-space:nowrap;
    box-shadow:3px 3px 0px #000; letter-spacing:0.5px; text-transform:uppercase;
  }
  .add-tag-btn:hover { transform:translate(1px,1px); box-shadow:2px 2px 0px #000; }
  .add-tag-btn:active { transform:translate(3px,3px); box-shadow:0px 0px 0px #000; }
  .color-picker-row { display:flex; gap:6px; margin-top:10px; }
  .color-dot { width:26px; height:26px; cursor:pointer; border:2px solid transparent; transition:all 0.12s; }
  .color-dot.active { border-color:var(--text-primary); box-shadow:2px 2px 0px #000; }
  .color-dot:hover { box-shadow:2px 2px 0px rgba(255,255,255,0.3); }
  .color-preview { display:flex; align-items:center; gap:8px; margin-top:10px; padding:8px 12px; background:var(--bg-deep); border:1px solid var(--border); }
  .color-preview-dot { width:8px; height:8px; }
  .color-preview-text { font-size:11px; color:var(--text-muted); letter-spacing:0.5px; }

  /* Tag selector in bottom bar */
  .tag-row { display:flex; gap:4px; align-items:center; overflow-x:auto; padding-bottom:2px; }
  .tag-sel-btn {
    padding:4px 10px; border:1px solid var(--border);
    background:var(--bg-surface); cursor:pointer; font-size:10px; font-weight:800;
    font-family:inherit; color:var(--text-muted); transition:all 0.1s; white-space:nowrap;
    display:flex; align-items:center; gap:4px; letter-spacing:0.5px; text-transform:uppercase;
  }
  .tag-sel-btn.active { border-color:var(--accent); background:var(--accent); color:#000; box-shadow:2px 2px 0px #000; }
  .tag-sel-btn:hover:not(.active) { border-color:var(--border-light); color:var(--text-primary); }
  .tag-sel-dot { width:6px; height:6px; }

  /* Stats period selector */
  .stats-period-row { display:flex; gap:0; margin-bottom:12px; background:transparent; border:1px solid var(--border-light); }
  .stats-period-btn {
    flex:1; padding:7px 0; border:none; border-right:1px solid var(--border-light); cursor:pointer;
    font-size:10px; font-weight:800; background:transparent; color:var(--text-muted);
    transition:all 0.1s; font-family:inherit; text-align:center; letter-spacing:1px; text-transform:uppercase;
  }
  .stats-period-btn:last-child { border-right:none; }
  .stats-period-btn.active { background:var(--accent); color:#000; }
  .stats-period-btn:hover:not(.active) { background:var(--bg-hover); color:var(--text-primary); }
  .stats-nav-row {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
  }
  .stats-nav-btn {
    background:none; border:1px solid var(--border-light); color:var(--accent);
    width:28px; height:28px; cursor:pointer; font-size:14px;
    font-family:inherit; display:flex; align-items:center; justify-content:center; transition:all 0.1s;
  }
  .stats-nav-btn:hover { background:var(--accent); color:#000; border-color:var(--accent); }
  .stats-nav-label { font-size:12px; font-weight:800; color:var(--text-primary); letter-spacing:0.5px; text-transform:uppercase; }
  .stats-nav-today {
    background:none; border:1px solid var(--border-light); color:var(--accent);
    height:24px; cursor:pointer; font-size:10px; font-weight:800;
    font-family:inherit; padding:0 8px; transition:all 0.1s; margin-left:6px; letter-spacing:0.5px; text-transform:uppercase;
  }
  .stats-nav-today:hover { background:var(--accent); color:#000; border-color:var(--accent); }

  /* Session tag label */
  .session-tag {
    display:inline-block; padding:2px 6px; font-size:9px;
    font-weight:700; margin-top:2px; letter-spacing:0.3px;
  }

  /* Session detail modal */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1500;
    display:none; align-items:center; justify-content:center;
    animation:fadeIn 0.15s ease-out;
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:var(--bg-card); border:1px solid var(--border-light);
    width:90%; max-width:400px; padding:20px; position:relative;
    box-shadow:6px 6px 0px var(--accent); animation:notifSlideIn 0.2s ease-out;
  }
  .modal-close {
    position:absolute; top:12px; right:12px; width:28px; height:28px;
    border:1px solid var(--border);
    background:var(--bg-surface); color:var(--text-muted); cursor:pointer;
    font-size:14px; display:flex; align-items:center; justify-content:center;
    transition:all 0.12s; font-family:inherit;
  }
  .modal-close:hover { background:var(--red); color:#fff; border-color:var(--red); }
  .modal-title { font-size:16px; font-weight:900; margin-bottom:4px; color:var(--text-primary); letter-spacing:-0.3px; }
  .modal-subtitle { font-size:10px; color:var(--text-muted); margin-bottom:14px; letter-spacing:1px; text-transform:uppercase; font-weight:700; }
  .modal-field-label { font-size:10px; font-weight:800; color:var(--text-muted); margin-bottom:6px; letter-spacing:1px; text-transform:uppercase; }
  .modal-textarea {
    width:100%; min-height:120px; padding:10px 12px;
    border:1px solid var(--border-light); background:var(--bg-surface);
    color:var(--text-primary); font-size:13px; font-family:inherit; resize:vertical;
    outline:none; transition:all 0.15s; line-height:1.5;
  }
  .modal-textarea:focus { border-color:var(--accent); box-shadow:3px 3px 0px var(--accent); }
  .modal-textarea::placeholder { color:var(--text-muted); }
  .modal-info-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .modal-info-chip {
    padding:4px 10px; font-size:10px; font-weight:800;
    background:var(--bg-surface); border:1px solid var(--border); color:var(--text-secondary);
    letter-spacing:0.5px; text-transform:uppercase;
  }
  .modal-btn-row { display:flex; gap:8px; margin-top:14px; }
  .modal-save-btn {
    flex:1; padding:11px; border:1px solid var(--accent);
    cursor:pointer; font-size:13px; font-weight:800; font-family:inherit; color:#000;
    background:var(--accent); box-shadow:4px 4px 0px #000; transition:all 0.1s;
    letter-spacing:0.5px; text-transform:uppercase;
  }
  .modal-save-btn:hover { transform:translate(2px,2px); box-shadow:2px 2px 0px #000; }
  .modal-save-btn:active { transform:translate(4px,4px); box-shadow:0px 0px 0px #000; }
  .modal-del-btn {
    padding:11px 14px; border:1px solid var(--red);
    cursor:pointer; font-size:13px; font-weight:800; font-family:inherit;
    color:var(--red); background:transparent; transition:all 0.1s;
    box-shadow:3px 3px 0px rgba(255,68,68,0.4); letter-spacing:0.5px; text-transform:uppercase;
  }
  .modal-del-btn:hover { background:var(--red); color:#fff; box-shadow:3px 3px 0px #000; }

  /* Countdown on session block */
  .session-countdown { font-size:8px; font-weight:700; color:var(--green); margin-top:1px; font-variant-numeric:tabular-nums; }

  /* Session-end notification popup */
  .notif-popup {
    position:fixed; bottom:20px; right:20px; z-index:2000;
    background:var(--bg-card); border:1px solid var(--accent);
    padding:16px 20px; min-width:260px;
    box-shadow:5px 5px 0px var(--accent);
    animation:notifSlideIn 0.4s ease-out; display:none; cursor:pointer;
  }
  .notif-popup.show { display:flex; flex-direction:column; gap:6px; }
  .notif-popup-title { font-size:14px; font-weight:900; color:var(--text-primary); display:flex; align-items:center; gap:8px; text-transform:uppercase; letter-spacing:0.5px; }
  .notif-popup-body { font-size:12px; color:var(--text-secondary); }
  .notif-popup-dismiss { font-size:10px; color:var(--accent); font-weight:800; margin-top:4px; letter-spacing:1px; text-transform:uppercase; }

  /* Break overlay — full screen zen */
  @keyframes breakFadeIn { from{opacity:0} to{opacity:1} }
  @keyframes breakSlideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  @keyframes breatheRing { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.12);opacity:0.2} }
  @keyframes breathePulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes breakPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .break-overlay {
    position:fixed; inset:0; z-index:1800;
    background:#000;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    animation:breakFadeIn 0.4s ease-out;
  }
  .break-overlay.show { display:flex; }

  /* Prompt screen */
  .break-prompt {
    display:flex; flex-direction:column; align-items:center; text-align:center;
    animation:breakSlideUp 0.4s ease-out;
    padding: 24px;
  }
  .break-prompt-emoji { font-size:52px; margin-bottom:20px; }
  .break-prompt-title { font-size:28px; font-weight:900; color:var(--text-primary); margin-bottom:8px; letter-spacing:-0.5px; }
  .break-prompt-sub { font-size:13px; color:var(--text-secondary); margin-bottom:36px; max-width:280px; line-height:1.6; letter-spacing:0.3px; }
  .break-prompt-options { display:flex; gap:10px; margin-bottom:24px; }
  .break-opt-btn {
    width:90px; height:90px;
    border:1px solid var(--border-light);
    background:var(--bg-card); cursor:pointer; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:all 0.1s; gap:2px; box-shadow:4px 4px 0px #333;
  }
  .break-opt-btn:hover { border-color:var(--accent); background:var(--accent); transform:translate(2px,2px); box-shadow:2px 2px 0px #333; }
  .break-opt-btn:hover .break-opt-num { color:#000; }
  .break-opt-btn:hover .break-opt-label { color:#000; }
  .break-opt-num { font-size:26px; font-weight:900; color:var(--accent); transition:color 0.1s; }
  .break-opt-label { font-size:9px; font-weight:800; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; transition:color 0.1s; }
  .break-skip-btn {
    background:none; border:1px solid var(--border); cursor:pointer; font-family:inherit;
    font-size:11px; font-weight:800; color:var(--text-muted); padding:8px 20px;
    transition:all 0.1s; letter-spacing:1px; text-transform:uppercase;
  }
  .break-skip-btn:hover { border-color:var(--border-light); color:var(--text-primary); }

  /* Active timer screen */
  .break-timer-screen {
    display:flex; flex-direction:column; align-items:center; text-align:center;
    animation:breakSlideUp 0.4s ease-out; padding:24px; width:100%;
  }
  .break-ring-wrap {
    position:relative; width:200px; height:200px;
    display:flex; align-items:center; justify-content:center; margin-bottom:32px;
  }
  .break-ring {
    position:absolute; inset:0;
    border:2px solid var(--accent);
    animation:breatheRing 4s ease-in-out infinite;
  }
  .break-ring-inner {
    position:absolute; inset:20px;
    background:var(--accent-bg);
    animation:breathePulse 4s ease-in-out infinite;
  }
  .break-timer-display {
    position:relative; z-index:1;
    font-size:52px; font-weight:900; color:var(--text-primary);
    font-variant-numeric:tabular-nums; letter-spacing:-1px;
  }
  .break-timer-status {
    font-size:12px; font-weight:900; color:var(--accent); letter-spacing:3px;
    text-transform:uppercase; margin-bottom:8px;
    animation:breakPulse 3s ease-in-out infinite;
  }
  .break-timer-hint { font-size:12px; color:var(--text-muted); margin-bottom:36px; letter-spacing:0.5px; }
  .break-progress-track {
    width:260px; height:3px; background:var(--bg-surface);
    overflow:hidden; margin-bottom:36px; border:1px solid var(--border);
  }
  .break-progress-bar {
    height:100%; background:var(--accent);
    transition:width 1s linear;
  }
  .break-end-btn {
    padding:12px 36px; border:1px solid var(--border-light); cursor:pointer;
    background:var(--bg-card); color:var(--text-secondary); font-size:13px; font-weight:800;
    font-family:inherit; transition:all 0.1s; box-shadow:3px 3px 0px #333;
    letter-spacing:1px; text-transform:uppercase;
  }
  .break-end-btn:hover { border-color:var(--accent); color:#000; background:var(--accent); box-shadow:3px 3px 0px #000; }

  /* Inbox page */
  .inbox-page { flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden; }
  .inbox-add-bar {
    display:flex; gap:0; border-bottom:1px solid var(--border); flex-shrink:0;
    background:var(--bg-card);
  }
  .inbox-input {
    flex:1; padding:14px 16px; background:transparent; border:none;
    color:var(--text-primary); font-size:14px; font-family:inherit; outline:none;
    font-weight:500;
  }
  .inbox-input::placeholder { color:var(--text-muted); font-weight:400; }
  .inbox-add-btn {
    padding:0 20px; border:none; border-left:1px solid var(--border);
    background:transparent; color:var(--text-muted); cursor:pointer;
    font-size:20px; font-weight:300; font-family:inherit; transition:all 0.1s;
    display:flex; align-items:center; justify-content:center;
  }
  .inbox-add-btn:hover { background:var(--accent); color:#000; }

  .inbox-list { flex:1; overflow-y:auto; padding:0; }
  .inbox-empty {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; gap:10px; padding:40px;
  }
  .inbox-empty-icon { font-size:36px; opacity:0.3; }
  .inbox-empty-text { font-size:12px; color:var(--text-muted); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; text-align:center; }

  .inbox-section-label {
    padding:10px 16px 6px; font-size:10px; font-weight:800; color:var(--text-muted);
    letter-spacing:1.5px; text-transform:uppercase; border-bottom:1px solid var(--border);
    background:var(--bg-deep); position:sticky; top:0; z-index:2;
  }
  .inbox-item {
    display:flex; align-items:center; gap:12px; padding:12px 16px;
    border-bottom:1px solid var(--border); transition:background 0.1s;
    background:var(--bg-card);
  }
  .inbox-item:hover { background:var(--bg-surface); }
  .inbox-item.done { opacity:0.45; }
  .inbox-check {
    width:20px; height:20px; border:1px solid var(--border-light); flex-shrink:0;
    background:transparent; cursor:pointer; display:flex; align-items:center;
    justify-content:center; transition:all 0.1s; font-size:11px; color:transparent;
    font-family:inherit; padding:0;
  }
  .inbox-check:hover { border-color:var(--accent); }
  .inbox-item.done .inbox-check { background:var(--accent); border-color:var(--accent); color:#000; }
  .inbox-title {
    flex:1; font-size:13px; font-weight:600; color:var(--text-primary); line-height:1.4;
    word-break:break-word;
  }
  .inbox-item.done .inbox-title { text-decoration:line-through; color:var(--text-muted); }
  .inbox-tag-dot { width:7px; height:7px; flex-shrink:0; }
  .inbox-actions { display:flex; gap:0; flex-shrink:0; }
  .inbox-action-btn {
    width:32px; height:32px; border:1px solid var(--border); border-left:none;
    background:transparent; color:var(--text-muted); cursor:pointer;
    font-size:12px; display:flex; align-items:center; justify-content:center;
    transition:all 0.1s; font-family:inherit; padding:0;
  }
  .inbox-action-btn:first-child { border-left:1px solid var(--border); }
  .inbox-action-btn:hover { background:var(--accent); color:#000; border-color:var(--accent); }
  .inbox-action-btn.del:hover { background:var(--red); color:#fff; border-color:var(--red); }

  /* Schedule picker overlay from inbox */
  .schedule-picker {
    position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1600;
    display:none; align-items:center; justify-content:center;
  }
  .schedule-picker.show { display:flex; }
  .schedule-picker-card {
    background:var(--bg-card); border:1px solid var(--border-light);
    box-shadow:6px 6px 0px var(--accent); width:90%; max-width:380px; padding:20px;
  }
  .schedule-picker-title { font-size:15px; font-weight:900; color:var(--text-primary); margin-bottom:4px; }
  .schedule-picker-task { font-size:12px; color:var(--text-muted); margin-bottom:18px; font-style:italic; }
  .schedule-picker-label { font-size:10px; font-weight:800; color:var(--text-muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
  .schedule-date-row { display:flex; gap:6px; margin-bottom:14px; }
  .schedule-date-btn {
    flex:1; padding:8px 4px; border:1px solid var(--border-light); background:var(--bg-surface);
    color:var(--text-secondary); cursor:pointer; font-size:11px; font-weight:800;
    font-family:inherit; text-align:center; transition:all 0.1s; letter-spacing:0.5px;
  }
  .schedule-date-btn.active { background:var(--accent); border-color:var(--accent); color:#000; box-shadow:2px 2px 0px #000; }
  .schedule-time-row { display:flex; gap:6px; align-items:center; margin-bottom:18px; }
  .schedule-time-input {
    flex:1; padding:10px 12px; border:1px solid var(--border-light); background:var(--bg-surface);
    color:var(--text-primary); font-size:14px; font-family:inherit; outline:none; transition:all 0.15s;
    font-weight:700;
  }
  .schedule-time-input:focus { border-color:var(--accent); box-shadow:3px 3px 0px var(--accent); }
  .schedule-picker-btns { display:flex; gap:8px; }
  .schedule-confirm-btn {
    flex:1; padding:11px; border:1px solid var(--accent); background:var(--accent);
    color:#000; font-size:13px; font-weight:800; font-family:inherit; cursor:pointer;
    box-shadow:4px 4px 0px #000; transition:all 0.1s; letter-spacing:0.5px; text-transform:uppercase;
  }
  .schedule-confirm-btn:hover { transform:translate(2px,2px); box-shadow:2px 2px 0px #000; }
  .schedule-cancel-btn {
    padding:11px 16px; border:1px solid var(--border-light); background:transparent;
    color:var(--text-muted); font-size:13px; font-weight:800; font-family:inherit; cursor:pointer;
    transition:all 0.1s; letter-spacing:0.5px; text-transform:uppercase;
  }
  .schedule-cancel-btn:hover { border-color:var(--border-light); color:var(--text-primary); }

  /* Scrollbar */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border-light); }
  ::-webkit-scrollbar-thumb:hover { background:var(--accent); }

  /* ===== AI INLINE INPUT ===== */
  .ai-inline-input {
    flex: 2;
    min-width: 0;
    height: 100%;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 8px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    align-self: stretch;
  }
  .ai-inline-input:focus {
    border-color: var(--accent);
    box-shadow: 2px 2px 0px var(--accent);
    z-index: 1;
  }
  .ai-inline-input::placeholder {
    color: var(--text-muted);
    font-style: italic;
    font-weight: 400;
  }
  .ai-bar-result {
    font-size:11px;
    font-weight:700;
    display:none;
    align-items:center;
    gap:8px;
    letter-spacing:0.3px;
    padding: 4px 0 0;
  }
  .ai-bar-result.show { display:flex; }
  .ai-bar-result.success { color:var(--green); }
  .ai-bar-result.error { color:var(--red); }
  .ai-bar-reasoning {
    font-size:10px;
    color:var(--text-muted);
    font-weight:400;
    font-style:italic;
  }

  /* AI scheduling full-screen loading overlay */
  .ai-loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 8888;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(3px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    animation: fadeIn 0.15s ease-out;
  }
  .ai-loading-overlay.active { display: flex; }
  .ai-loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border-light);
    border-top-color: var(--accent);
    border-radius: 50% !important;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-loading-text {
    font-size: 13px; font-weight: 800;
    color: var(--text-primary);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .ai-loading-sub {
    font-size: 11px; font-weight: 400;
    color: var(--text-secondary);
    font-style: italic;

async function submitAuth() {

  if (!email)    { errorEl.textContent = 'Please enter your email.'; return; }

  if (authMode === 'signup') {
    if (password.length < 6)     { errorEl.textContent = 'Password must be at least 6 characters.'; return; }
    if (password !== confirm)    { errorEl.textContent = 'Passwords do not match.'; return; }
  }

  setAuthLoading(true);
  try {
    if (authMode === 'signin') {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = error.message;
      } else {
        currentUser = data.user;
        showApp();
        await loadFromSupabase();
      }
    } else {
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) {
        errorEl.textContent = error.message;

        errorEl.style.color = 'var(--green)';
        errorEl.textContent = '✓ Account created! Check your email to confirm, then sign in.';
        setTimeout(() => switchAuthTab('signin'), 3500);

function playEndChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i*0.15);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i*0.15 + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i*0.15 + 0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i*0.15);
      osc.stop(ctx.currentTime + i*0.15 + 0.6);
    });
  } catch(e) {}
}

function playStartChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [392.00, 523.25];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i*0.2);
      gain.gain.linearRampToValueAtTime(0.22, ctx.currentTime + i*0.2 + 0.06);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i*0.2 + 0.6);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i*0.2);
      osc.stop(ctx.currentTime + i*0.2 + 0.7);
    });
  } catch(e) {}
}

async function saveSession(session) {
  if (!currentUser) return;

  try {
    const sessionData = {
      ...session,
      user_id: currentUser.id
    };

    if (session.id && session.id.length > 0) {
      // Upsert existing session
      const { error } = await supabase
        .from('sessions')
        .upsert(sessionData, { onConflict: 'id' });

      if (error) throw error;
    } else {
      // Insert new session - generate UUID-like ID
      sessionData.id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2,6);
      const { error } = await supabase
        .from('sessions')
        .insert([sessionData]);

      if (error) throw error;
      session.id = sessionData.id;
    }
  } catch (e) {
    console.error('Save session error:', e);
    showToast('Error saving session');

}
function getHourLabel(h) {
  if(h===0) return "12AM"; if(h<12) return h+"AM"; if(h===12) return "12PM"; return (h-12)+"PM";
}
function getTimeLabel(h, m) {
  const ampm = h>=12?"pm":"am";
  const hr = h===0?12:(h>12?h-12:h);
  return `${hr}:${String(m).padStart(2,"0")}${ampm}`;
}
let toastTimeout = null;
function showToast(msg, duration) {
  const el = document.getElementById("toast");
  const msgEl = document.getElementById("toast-msg");
  if (msgEl) msgEl.textContent = msg;
  el.classList.add("show");
  if (toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove("show"), duration || 2500);
}
function dismissToast() {
  const el = document.getElementById("toast");
  el.classList.remove("show");
  if (toastTimeout) { clearTimeout(toastTimeout); toastTimeout = null; }
}
function sessionEndDate(s) {
  if(s.started_at) return new Date(s.started_at + s.duration * 60000);
  const parts = s.date.split("-");
  const start = new Date(+parts[0], +parts[1]-1, +parts[2], s.start_hour, s.start_min, 0);
  return new Date(start.getTime() + s.duration * 60000);
}

function getCalDays() {
  const days = [], base = new Date();
  base.setDate(base.getDate() + state.calOffset * 3);
  for(let i=0;i<3;i++) { const d=new Date(base); d.setDate(d.getDate()+i); days.push(d); }
  return days;
}
function getSessionsForSlotAt(date, hour, min) {
  return state.sessions.filter(s => {
    if(s.date!==date||s.status==="cancelled") return false;
    const sS=s.start_hour*60+s.start_min, sE=sS+s.duration, t=hour*60+min;
    return t>=sS && t<sE;
  });
}
function isSlotCovered(date, hour, min) {
  return state.sessions.some(s => {
    if(s.date!==date||s.status==="cancelled") return false;
    const sS=s.start_hour*60+s.start_min, sE=sS+s.duration, t=hour*60+min;
    return t>sS && t<sE;
  });
}
function isSlotPast(dk, h, m) {
  const now=new Date(), today=getDateKey(now);
  if(dk<today) return true;
  if(dk===today && (h*60+(m||0)) < (now.getHours()*60+now.getMinutes())) return true;
  return false;
}

async function bookSession(date, hour, min) {
  const newSession = {
    id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    date, start_hour:hour, start_min:min,
    duration:state.focusSettings.duration,
    task:state.focusSettings.task, tag:state.focusSettings.tag, status:"booked",
    notes: null, started_at: null
  };
  state.sessions.push(newSession);
  state.selectedSlot=null;
  await saveSession(newSession);
  render();
  showToast(`${state.focusSettings.duration}min session booked!`);
}

let sessionTimers = {};
async function startSession(id) {
  const s=state.sessions.find(x=>x.id===id);
  if(s) {
    s.status="active"; s.started_at=Date.now();
    await saveSession(s);
    render();
    notifySessionStart(s);
    const msLeft = sessionEndDate(s).getTime() - Date.now();
    if(msLeft > 0) {
      if(sessionTimers[id]) clearTimeout(sessionTimers[id]);
      sessionTimers[id] = setTimeout(()=> {
        const sess = state.sessions.find(x=>x.id===id);
        if(sess && sess.status==="active") completeSession(id, true);
        delete sessionTimers[id];
      }, msLeft);
    }
  }
}
async function completeSession(id, autoCompleted) {
  const s=state.sessions.find(x=>x.id===id);
  if(s&&(s.status==="active"||s.status==="booked")) {
    s.status="completed";
    if(sessionTimers[id]) { clearTimeout(sessionTimers[id]); delete sessionTimers[id]; }
    await saveSession(s);
    render();
    showToast("Session completed! Great work!");
    notifySessionEnd();
    setTimeout(showBreakPrompt, 1500);
  }
}

// ===== BREAK SYSTEM =====
let breakTimer = null;
let breakInterval = null;
let breakEndTime = null;

let breakTotalMs = 0;

function showBreakPrompt() {
  document.getElementById("break-content").innerHTML = `
    <div class="break-prompt">
      <div class="break-prompt-emoji">☕</div>
      <div class="break-prompt-title">Session Complete!</div>
      <div class="break-prompt-sub">You crushed it. Take a moment to rest — your brain will thank you.</div>
      <div class="break-prompt-options">
        <button class="break-opt-btn" onclick="startBreak(5)">
          <span class="break-opt-num">5</span>
          <span class="break-opt-label">minutes</span>
        </button>
        <button class="break-opt-btn" onclick="startBreak(10)">
          <span class="break-opt-num">10</span>
          <span class="break-opt-label">minutes</span>
        </button>
        <button class="break-opt-btn" onclick="startBreak(15)">
          <span class="break-opt-num">15</span>
          <span class="break-opt-label">minutes</span>
        </button>
      </div>
      <button class="break-skip-btn" onclick="dismissBreak()">Skip, keep going →</button>
    </div>
  `;
  document.getElementById("break-overlay").classList.add("show");
}

function startBreak(mins) {
  breakTotalMs = mins * 60000;
  breakEndTime = Date.now() + breakTotalMs;

  document.getElementById("break-content").innerHTML = `
    <div class="break-timer-screen">
      <div class="break-timer-status">On Break</div>
      <div class="break-ring-wrap">
        <div class="break-ring"></div>
        <div class="break-ring-inner"></div>
        <div class="break-timer-display" id="break-display">${mins}:00</div>
      </div>
      <div class="break-timer-hint">Breathe. Stretch. Hydrate. 🌿</div>
      <div class="break-progress-track">
        <div class="break-progress-bar" id="break-progress" style="width:100%"></div>
      </div>
      <button class="break-end-btn" onclick="endBreak(false)">End Break Early</button>
    </div>
  `;
  updateBreakTimer();
  breakInterval = setInterval(updateBreakTimer, 1000);
  breakTimer = setTimeout(() => endBreak(true), breakTotalMs);
}

function updateBreakTimer() {
  const msLeft = breakEndTime - Date.now();
  if(msLeft <= 0) return;
  const totalSec = Math.ceil(msLeft / 1000);
  const mins = Math.floor(totalSec / 60);
  const secs = totalSec % 60;
  const display = document.getElementById("break-display");
  const progress = document.getElementById("break-progress");
  if(display) display.textContent = `${mins}:${String(secs).padStart(2,"0")}`;
  if(progress) progress.style.width = `${(msLeft / breakTotalMs) * 100}%`;
}

function endBreak(auto) {
  if(breakTimer) { clearTimeout(breakTimer); breakTimer = null; }
  if(breakInterval) { clearInterval(breakInterval); breakInterval = null; }
  breakEndTime = null;
  document.getElementById("break-overlay").classList.remove("show");
  document.title = "ZoneIn - Focus Session Calendar";
  if(auto) {
    playStartChime();
    showNotifPopup("Break Over!", "Ready to get back to work?", true);
  } else {
    showToast("Break ended. Let's go!");
  }
}

function dismissBreak() {
  document.getElementById("break-overlay").classList.remove("show");
}

async function cancelSession(id) {
  state.sessions=state.sessions.filter(x=>x.id!==id);
  await deleteSession(id);
  state.confirmingCancel=null;
  render();
  showToast("Session cancelled");
}
function showCancelConfirm(id) { state.confirmingCancel=id; state.selectedSlot=null; render(); }
function keepSession() { state.confirmingCancel=null; render(); }
function selectSlot(date, hour, min) {
  state.confirmingCancel=null;
  if(state.selectedSlot && state.selectedSlot.date===date && state.selectedSlot.hour===hour && state.selectedSlot.min===min)
    state.selectedSlot=null;
  else state.selectedSlot={date,hour,min};
  render();
}
function switchTab(tab) {
  state.view=tab;
  document.querySelectorAll(".nav-tab").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  render();
}

// ===== SESSION DETAIL MODAL =====
let modalSessionId = null;

function openSessionModal(id) {
  const s = state.sessions.find(x=>x.id===id);
  if(!s) return;
  modalSessionId = id;

  const statusLabel = s.status==="active" ? "In Progress" : s.status==="completed" ? "Completed" : s.status==="booked" ? "Booked" : s.status;

  document.getElementById("modal-title").textContent = "Session Details";
  document.getElementById("modal-subtitle").textContent = `${s.date} at ${getTimeLabel(s.start_hour, s.start_min)}`;

  document.getElementById("modal-info").innerHTML = `
    <span class="modal-info-chip">${s.duration} min</span>
    <span class="modal-info-chip">${statusLabel}</span>
  `;

  // Render tag selector
  renderModalTagRow(s.tag || null);

  document.getElementById("modal-notes").value = s.notes || "";
  document.getElementById("modal-overlay").classList.add("show");
  setTimeout(()=>document.getElementById("modal-notes").focus(), 100);
}

function renderModalTagRow(selectedTagId) {
  const row = document.getElementById("modal-tag-row");
  if (!row) return;
  const noneActive = !selectedTagId;
  row.innerHTML = `
    <button class="tag-sel-btn ${noneActive ? "active" : ""}" onclick="selectModalTag(null)">None</button>
    ${state.tags.map(t => `
      <button class="tag-sel-btn ${selectedTagId === t.id ? "active" : ""}"
        onclick="selectModalTag('${t.id}')"
        style="${selectedTagId === t.id ? "" : `border-color:${t.color}55`}">
        <span class="tag-sel-dot" style="background:${t.color}"></span>${t.name}
      </button>
    `).join("")}
    ${state.tags.length === 0 ? '<span style="font-size:11px;color:var(--text-muted)">No tags yet — create some in the Tags tab</span>' : ""}
  `;
}

function selectModalTag(tagId) {
  const s = state.sessions.find(x => x.id === modalSessionId);
  if (!s) return;
  s.tag = tagId;
  renderModalTagRow(tagId);
}

function closeModal(e) {
  if(e && e.target && e.target.id !== "modal-overlay") return;
  document.getElementById("modal-overlay").classList.remove("show");
  modalSessionId = null;
}

async function saveSessionNotes() {
  if(!modalSessionId) return;
  const s = state.sessions.find(x=>x.id===modalSessionId);
  if(!s) return;
  s.notes = document.getElementById("modal-notes").value.trim();
  // s.tag is already updated live via selectModalTag()
  await saveSession(s);
  render();
  document.getElementById("modal-overlay").classList.remove("show");
  modalSessionId = null;
  showToast("Saved!");
}

async function deleteSessionFromModal() {
  if(!modalSessionId) return;
  const id = modalSessionId;
  state.sessions = state.sessions.filter(x=>x.id!==id);
  if(sessionTimers[id]) { clearTimeout(sessionTimers[id]); delete sessionTimers[id]; }
  await deleteSession(id);
  render();
  document.getElementById("modal-overlay").classList.remove("show");
  modalSessionId = null;
  showToast("Session removed");
}

// ===== COUNTDOWN SYSTEM =====
function getSessionRemaining(s) {
  if(s.status!=="active") return null;
  const msLeft = sessionEndDate(s).getTime() - Date.now();
  if(msLeft<=0) return null;
  const totalSec = Math.ceil(msLeft/1000);
  const mins = Math.floor(totalSec/60);
  const secs = totalSec%60;
  return { mins, secs, text:`${mins}:${String(secs).padStart(2,"0")}` };
}

function updateCountdowns() {
  const activeSessions = state.sessions.filter(s=>s.status==="active");

  if(activeSessions.length>0) {
    const s = activeSessions[0];
    const rem = getSessionRemaining(s);
    if(rem) {
      const sTag = s.tag ? state.tags.find(t=>t.id===s.tag) : null;
      document.title = `${rem.text} ${sTag?sTag.name:"Focus"} - ZoneIn`;
    } else {
      document.title = "ZoneIn - Focus Session Calendar";
    }
  } else if(breakEndTime) {
    const bLeft = breakEndTime - Date.now();
    if(bLeft > 0) {
      const bSec = Math.ceil(bLeft/1000);
      const bM = Math.floor(bSec/60), bS = bSec%60;
      document.title = `${bM}:${String(bS).padStart(2,"0")} Break - ZoneIn`;
    }
  } else {
    document.title = "ZoneIn - Focus Session Calendar";
  }

  document.querySelectorAll("[data-countdown-id]").forEach(el=>{
    const sid = el.getAttribute("data-countdown-id");
    const s = state.sessions.find(x=>x.id===sid);
    if(s) {
      const rem = getSessionRemaining(s);
      el.textContent = rem ? rem.text + " left" : "Done!";
    }
  });
}

function updateSessionStatuses() {
  const now=new Date(), today=getDateKey(now), nowM=now.getHours()*60+now.getMinutes();
  let changed=false;
  state.sessions.forEach(s=>{
    if(s.status==="booked") {
      const end=s.start_hour*60+s.start_min+s.duration;
      if(s.date<today||(s.date===today&&nowM>=end)) { s.status="cancelled"; changed=true; }
    }
  });
  if(changed) {
    state.sessions.forEach(s => {
      if(s.status === "cancelled") saveSession(s);
    });
    render();
  }
}

// ========== RENDER ==========
function render() {
  const content = document.getElementById("content");
  const bottomBar = document.getElementById("bottom-bar");
  const now = new Date();
  const today = getDateKey();
  const currentHour = now.getHours();

  if(state.view==="calendar") {
    const calDays = getCalDays();
    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const startH=0, endH=23, rowHeight=9;
    const timeSlots=[];
    for(let h=startH;h<=endH;h++) for(let m=0;m<60;m+=5) timeSlots.push({hour:h,min:m});

    const nowMin=now.getMinutes(), nowTotal=currentHour*60+nowMin, startTotal=startH*60;
    const nowOffset=((nowTotal-startTotal)/5)*rowHeight;
    const showNowLine=calDays.some(d=>getDateKey(d)===today)&&currentHour>=startH&&currentHour<=endH;

    const rangeStart=calDays[0], rangeEnd=calDays[2];
    const rangeLabel = rangeStart.getMonth()===rangeEnd.getMonth()
      ? `${monthNames[rangeStart.getMonth()]} ${rangeStart.getFullYear()}`
      : `${monthNames[rangeStart.getMonth()]} — ${monthNames[rangeEnd.getMonth()]} ${rangeEnd.getFullYear()}`;

    content.innerHTML = `
      <div class="cal-card">
        <div class="cal-header">
          <div class="cal-title">${rangeLabel}</div>
          <div class="cal-nav-group">
            <button class="cal-nav" onclick="state.calOffset--;render()">‹</button>
            <button class="cal-today-btn" onclick="state.calOffset=0;render()">Today</button>
            <button class="cal-nav" onclick="state.calOffset++;render()">›</button>
          </div>
        </div>
        <div class="cal-day-headers">
          <div></div>
          ${calDays.map(d=>{
            const dk=getDateKey(d), isT=dk===today;
            return `<div class="cal-day-hdr ${isT?"today-hdr":""}">
              ${isT?"Today":dayNames[d.getDay()]} ${d.getDate()}
            </div>`;
          }).join("")}
        </div>
        <div class="cal-scroll" id="cal-scroll">
          ${showNowLine?`
            <div class="now-time-label" style="top:${nowOffset-5}px">${getTimeLabel(currentHour,nowMin)}</div>
            <div class="now-dot" style="top:${nowOffset}px"></div>
            <div class="now-line" style="top:${nowOffset}px"></div>
          `:""}
          ${timeSlots.map(slot=>{
            const h=slot.hour, m=slot.min, isHour=m===0;
            const is15 = m%15===0;
            const tLabel = isHour ? getHourLabel(h) : (is15 ? `:${String(m).padStart(2,"0")}` : "");
            return `<div class="cal-time-row ${isHour?"hour-row":(is15?"quarter-row":"")}">
              <div class="cal-time-label ${isHour?"hour-label":""}">${tLabel}</div>
              ${calDays.map(d=>{
                const dk=getDateKey(d), past=isSlotPast(dk,h,m);
                const sessions=getSessionsForSlotAt(dk,h,m), hasS=sessions.length>0;
                const isSel=state.selectedSlot&&state.selectedSlot.date===dk&&state.selectedSlot.hour===h&&state.selectedSlot.min===m;
                let sc="";

                if(isSel&&!hasS) {
                  const popH=Math.round((state.focusSettings.duration/5)*rowHeight)-2;
                  sc=`<div class="slot-popup" style="height:${popH}px" onclick="event.stopPropagation()">
                    <button class="slot-popup-btn book" onclick="event.stopPropagation();bookSession('${dk}',${h},${m})">Book ${state.focusSettings.duration}min</button>
                    <button class="slot-popup-btn clear" onclick="event.stopPropagation();state.selectedSlot=null;render()">Clear</button>
                  </div>`;
                } else if(hasS) {
                  sessions.forEach(s=>{
                    if(s.start_hour===h&&s.start_min===m) {
                      const bH=Math.round((s.duration/5)*rowHeight)-2;
                      const showCancel=state.confirmingCancel===s.id;

                      if(showCancel) {
                        sc+=`<div class="cancel-popup" style="height:${bH}px" onclick="event.stopPropagation()">
                          <button class="cancel-popup-btn keep" onclick="event.stopPropagation();keepSession()">Keep</button>
                          <button class="cancel-popup-btn cancel-confirm" onclick="event.stopPropagation();cancelSession('${s.id}')">Cancel</button>
                        </div>`;
                      } else {
                        const sTag = s.tag ? state.tags.find(t=>t.id===s.tag) : null;
                        const countdownInit = s.status==="active" ? (()=>{const r=getSessionRemaining(s);return r?r.text+" left":"In Progress"})() : "";
                        sc+=`<div class="session-block ${s.status}" style="height:${bH}px;display:flex;flex-direction:column;justify-content:space-between" onclick="event.stopPropagation();openSessionModal('${s.id}')">
                          <div>
                            <div style="display:flex;align-items:center;justify-content:space-between">
                              <div style="font-size:10px;font-weight:700">${getTimeLabel(s.start_hour,s.start_min)}</div>
                              <div style="font-size:8px;opacity:0.6;margin-right:${s.status==="completed"?"2":"44"}px">${s.duration}min</div>
                            </div>
                            ${sTag?`<div class="session-tag" style="background:${sTag.color}33;color:${sTag.color}">${sTag.name}</div>`:""}
                          </div>
                          <div>
                            ${s.status==="active"?`<div class="session-countdown" data-countdown-id="${s.id}">${countdownInit}</div>`:""}
                            ${s.status==="completed"?'<div style="font-size:8px;color:var(--text-secondary)">✓ Done</div>':""}
                            ${s.notes?'<div style="font-size:7px;color:var(--accent);opacity:0.7">✎ notes</div>':""}
                          </div>
                          ${s.status==="booked"||s.status==="active"?`
                            <div class="session-actions">
                              ${s.status==="booked"?`<button class="session-action-btn" onclick="event.stopPropagation();startSession('${s.id}')">▶</button>`:""}
                              ${s.status==="active"?`<button class="session-action-btn" onclick="event.stopPropagation();completeSession('${s.id}')">✓</button>`:""}
                              <button class="session-action-btn x-btn" onclick="event.stopPropagation();showCancelConfirm('${s.id}')">✕</button>
                            </div>
                          `:""}
                        </div>`;
                      }
                    }
                  });
                }
                const covered=isSlotCovered(dk,h,m);
                return `<div class="cal-slot ${past&&!hasS?"past-slot":""}"
                  style="${covered&&!hasS?"pointer-events:none;":""}"
                  ${!past&&!hasS&&!isSel&&!covered?`onclick="selectSlot('${dk}',${h},${m})"`:""}>
                  ${sc}
                </div>`;
              }).join("")}
            </div>`;
          }).join("")}
        </div>
      </div>`;

    bottomBar.style.display="flex";
    const selTag = state.focusSettings.tag ? state.tags.find(t=>t.id===state.focusSettings.tag) : null;
    bottomBar.innerHTML = `
      <div class="ai-section">
        <div class="ai-input-row">
          <input
            class="ai-inline-input"
            id="ai-bar-input"
            type="text"
            placeholder="⚡ schedule with AI..."
            onkeydown="if(event.key==='Enter')submitAISchedule()"
            autocomplete="off"
            spellcheck="false"
            style="flex:1;height:32px;"
          >
          <button class="ai-send-btn" id="ai-send-btn" onclick="submitAISchedule()">Book</button>
        </div>
        <div class="ai-bar-result" id="ai-bar-result"></div>
      </div>
      <div class="duration-row">
        <span class="dur-label">Duration</span>
        ${[25,50,75].map(d=>`
          <button class="dur-btn ${state.focusSettings.duration===d?"active":""}"
            onclick="state.focusSettings.duration=${d};saveSettings();render()">
            ${d}<span>min</span>
          </button>
        `).join("")}
      </div>
      ${state.tags.length>0?`
        <div class="tag-row">
          <span class="dur-label">Tag</span>
          <button class="tag-sel-btn ${!state.focusSettings.tag?"active":""}" onclick="state.focusSettings.tag=null;saveSettings();render()">None</button>
          ${state.tags.map(t=>`
            <button class="tag-sel-btn ${state.focusSettings.tag===t.id?"active":""}" onclick="state.focusSettings.tag='${t.id}';saveSettings();render()">
              <span class="tag-sel-dot" style="background:${t.color}"></span>${t.name}
            </button>
          `).join("")}
        </div>
      `:""}
      <button class="book-bar-btn" ${state.selectedSlot?"":"disabled"}
        onclick="${state.selectedSlot?`bookSession('${state.selectedSlot.date}',${state.selectedSlot.hour},${state.selectedSlot.min})`:""}">
        <span class="bolt">⚡</span>
        ${state.selectedSlot
          ? `Book ${state.focusSettings.duration}min${selTag?" — "+selTag.name:""} — ${getTimeLabel(state.selectedSlot.hour,state.selectedSlot.min)}`
          : "Select a time slot to book"}
      </button>
    `;

    if(showNowLine) {
      const se=document.getElementById("cal-scroll");
      if(se) se.scrollTop=Math.max(0,nowOffset-100);
    }

  } else if(state.view==="inbox") {
    bottomBar.style.display="none";
    renderInbox(content);
  } else if(state.view==="tags") {
    bottomBar.style.display="none";
    renderTags(content);
  } else if(state.view==="stats") {
    bottomBar.style.display="none";
    renderStats(content);
  }
}

            </div>`;
          }).join("")}
        </div>` : '<div class="tags-empty">No tags yet. Create one above!</div>'}
      </div>
    </div>
  `;
  setTimeout(()=>{const inp=document.getElementById("new-tag-input");if(inp)inp.focus();},50);
}
