function renderInbox(container) {
  const pending = state.tasks.filter(t => !t.done);
  const done    = state.tasks.filter(t => t.done);

  const taskHTML = (t) => {
    const tag = t.tag_id ? state.tags.find(x => x.id === t.tag_id) : null;
    return `
      <div class="inbox-item ${t.done ? "done" : ""}" id="task-${t.id}">
        <button class="inbox-check" onclick="toggleTask('${t.id}')">${t.done ? "✓" : ""}</button>
        ${tag ? `<span class="inbox-tag-dot" style="background:${tag.color}" title="${tag.name}"></span>` : ""}
        <span class="inbox-title">${escapeHtml(t.title)}</span>
        <div class="inbox-actions">
          ${!t.done ? `<button class="inbox-action-btn" onclick="openSchedulePicker('${t.id}')" title="Schedule">⊕</button>` : ""}
          <button class="inbox-action-btn del" onclick="deleteTask('${t.id}')" title="Delete">✕</button>
        </div>
      </div>`;
  };

  container.innerHTML = `
    <div class="inbox-page">
      <div class="inbox-add-bar">
        <input class="inbox-input" id="inbox-input" type="text" placeholder="What's on your mind…" maxlength="200"
          onkeydown="if(event.key==='Enter')addTask()">
        <button class="inbox-add-btn" onclick="addTask()">+</button>
      </div>
      <div class="inbox-list">
        ${state.tasks.length === 0 ? `
          <div class="inbox-empty">
            <div class="inbox-empty-icon">📥</div>
            <div class="inbox-empty-text">Your inbox is clear.<br>Type above to capture a thought.</div>
          </div>
        ` : `
          ${pending.length > 0 ? `
            <div class="inbox-section-label">Pending — ${pending.length}</div>
            ${pending.map(taskHTML).join("")}
          ` : ""}
          ${done.length > 0 ? `
            <div class="inbox-section-label">Done — ${done.length}</div>
            ${done.map(taskHTML).join("")}
          ` : ""}
        `}
      </div>
    </div>
  `;
  setTimeout(() => { const inp = document.getElementById("inbox-input"); if(inp) inp.focus(); }, 50);
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function addTask() {
  const inp = document.getElementById("inbox-input");
  if (!inp) return;
  const title = inp.value.trim();
  if (!title) return;
  const id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const task = { id, title, done: false, tag_id: null, created_at: new Date().toISOString() };
  state.tasks.unshift(task);
  inp.value = "";
  render();
  await saveTask(task);
}

async function toggleTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  render();
  await saveTask(t);
}

async function deleteTask(id) {
  state.tasks = state.tasks.filter(x => x.id !== id);
  render();
  await deleteTaskFromDB(id);
}

// ===== SCHEDULE PICKER =====
let schedulingTaskId = null;

function openSchedulePicker(taskId) {
  schedulingTaskId = taskId;
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  document.getElementById("schedule-picker-task").textContent = `"${t.title}"`;

  // Build next 7 days
  const row = document.getElementById("schedule-date-row");
  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  const todayKey = getDateKey(new Date());
  row.innerHTML = days.map(d => {
    const dk = getDateKey(d);
    const label = i => ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
    const dayName = dk === todayKey ? "Today" : ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
    const dayNum = d.getDate();
    return `<button class="schedule-date-btn ${dk === todayKey ? "active" : ""}" data-dk="${dk}"
      onclick="selectScheduleDate(this)">${dayName}<br><span style="font-size:15px;font-weight:900">${dayNum}</span></button>`;
  }).join("");

  // Default time to next round hour
  const now = new Date();
  now.setMinutes(0); now.setSeconds(0);
  now.setHours(now.getHours() + 1);
  const hh = String(now.getHours()).padStart(2,"0");
  document.getElementById("schedule-time-input").value = `${hh}:00`;

  document.getElementById("schedule-picker").classList.add("show");
}

function selectScheduleDate(btn) {
  document.querySelectorAll(".schedule-date-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function closeSchedulePicker(e) {
  if (e && e.target.id !== "schedule-picker") return;
  document.getElementById("schedule-picker").classList.remove("show");
  schedulingTaskId = null;
}

async function confirmScheduleTask() {
  if (!schedulingTaskId) return;
  const t = state.tasks.find(x => x.id === schedulingTaskId);
  if (!t) return;

  const activeBtn = document.querySelector(".schedule-date-btn.active");
  const timeVal   = document.getElementById("schedule-time-input").value;
  if (!activeBtn || !timeVal) { showToast("Pick a day and time"); return; }

  const dk = activeBtn.dataset.dk;
  const [hStr, mStr] = timeVal.split(":");
  const h = parseInt(hStr), m = parseInt(mStr);

  // Create a booked session from this task
  const newSession = {
    id: null,
    date: dk,
    start_hour: h,
    start_min: m,
    duration: state.focusSettings.duration,
    task: "desk",
    tag: t.tag_id || state.focusSettings.tag || null,
    status: "booked",
    notes: t.title,
  };
  state.sessions.push(newSession);
  await saveSession(newSession);

  // Mark task as done
  t.done = true;
  await saveTask(t);

  document.getElementById("schedule-picker").classList.remove("show");
  schedulingTaskId = null;
  showToast(`Scheduled for ${getTimeLabel(h, m)}!`);
  switchTab("calendar");
}

async function addTag() {
  const inp = document.getElementById("new-tag-input");
  if(!inp) return;
  const name = inp.value.trim();
  if(!name) return;
  if(state.tags.some(t=>t.name.toLowerCase()===name.toLowerCase())) { showToast("Tag already exists"); return; }
  const id = name.toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,12) + Date.now().toString(36).slice(-4);
  const newTag = { id, name, color:state.newTagColor };
  state.tags.push(newTag);
  await saveTag(newTag);
  render();
  showToast(`Tag "${name}" added!`);
}

async function deleteTag(id) {
  state.tags = state.tags.filter(t=>t.id!==id);
  if(state.focusSettings.tag===id) { state.focusSettings.tag=null; await saveSettings(); }
  await deleteTagFromDB(id);
  render();
}

function setStatsPeriod(p) { state.statsPeriod=p; state.statsPeriodOffset=0; render(); }
function shiftStatsPeriod(dir) { state.statsPeriodOffset+=dir; render(); }

function getStatsDateRange(period) {
  const now=new Date(), off=state.statsPeriodOffset||0;
  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  if(period==="daily") {
    const d=new Date(now); d.setDate(d.getDate()+off);
    const dk=getDateKey(d);
    const label=dayNames[d.getDay()]+", "+monthNames[d.getMonth()]+" "+d.getDate();
    return { start:dk, end:dk, label, isCurrent:off===0 };
  } else if(period==="weekly") {
    const base=new Date(now); base.setDate(now.getDate()-now.getDay()+off*7);
    const s=new Date(base);
    const e=new Date(s); e.setDate(s.getDate()+6);
    const isCurrent=off===0;
    const label=monthNames[s.getMonth()]+" "+s.getDate()+" – "+monthNames[e.getMonth()]+" "+e.getDate();
    return { start:getDateKey(s), end:getDateKey(e), label, isCurrent };
  } else if(period==="monthly") {
    const target=new Date(now.getFullYear(), now.getMonth()+off, 1);
    const s=target;
    const e=new Date(target.getFullYear(), target.getMonth()+1, 0);
    const isCurrent=off===0;
    const label=monthNames[s.getMonth()]+" "+s.getFullYear();
    return { start:getDateKey(s), end:getDateKey(e), label, isCurrent };
  } else if(period==="yearly") {
    const yr=now.getFullYear()+off;
    const s=new Date(yr, 0, 1);
    const e=new Date(yr, 11, 31);
    const isCurrent=off===0;
    return { start:getDateKey(s), end:getDateKey(e), label:String(yr), isCurrent };
  }
  return { start:null, end:null, label:"All Time", isCurrent:true };
}

function buildTagStats(completed, totalMinutes, tags) {
  if(!tags || tags.length===0) return "";
  let rows = tags.map(t=>{
    const tc=completed.filter(s=>s.tag===t.id);
    const tCount=tc.length, tMins=tc.reduce((a,s)=>a+s.duration,0);
    const tHrs=(tMins/60).toFixed(1);
    const barW=totalMinutes>0?Math.max(4,Math.round((tMins/totalMinutes)*100)):0;
    return '<div style="display:flex;align-items:center;gap:8px">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+t.color+';flex-shrink:0"></div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">'
      +'<div style="font-size:11px;font-weight:600;color:var(--text-primary)">'+t.name+'</div>'
      +'<div style="font-size:10px;color:var(--text-muted)">'+tCount+' session'+(tCount!==1?'s':'')+' · '+(tMins>=60?tHrs+'h':tMins+'m')+'</div>'
      +'</div>'
      +'<div style="height:4px;border-radius:2px;background:var(--bg-surface);overflow:hidden">'
      +'<div style="height:100%;width:'+barW+'%;border-radius:2px;background:'+t.color+';transition:width 0.3s"></div>'
      +'</div></div></div>';
  }).join("");
  const untagged=completed.filter(s=>!s.tag);
  if(untagged.length>0) {
    const uMins=untagged.reduce((a,s)=>a+s.duration,0);
    const uHrs=(uMins/60).toFixed(1);
    const barW=totalMinutes>0?Math.max(4,Math.round((uMins/totalMinutes)*100)):0;
    rows+='<div style="display:flex;align-items:center;gap:8px">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:var(--text-muted);flex-shrink:0"></div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">'
      +'<div style="font-size:11px;font-weight:600;color:var(--text-primary)">Untagged</div>'
      +'<div style="font-size:10px;color:var(--text-muted)">'+untagged.length+' session'+(untagged.length!==1?'s':'')+' · '+(uMins>=60?uHrs+'h':uMins+'m')+'</div>'
      +'</div>'
      +'<div style="height:4px;border-radius:2px;background:var(--bg-surface);overflow:hidden">'
      +'<div style="height:100%;width:'+barW+'%;border-radius:2px;background:var(--text-muted);transition:width 0.3s"></div>'
      +'</div></div></div>';
  }
  return '<div class="stat-card wide"><div style="font-size:12px;font-weight:700;margin-bottom:8px">By Tag</div><div style="display:flex;flex-direction:column;gap:6px">'+rows+'</div></div>';
}

function renderStats(container) {
  const now=new Date(), today=getDateKey();
  const period=state.statsPeriod||"weekly";
  const range=getStatsDateRange(period);

  const allCompleted=state.sessions.filter(s=>s.status==="completed");
  const completed=range.start ? allCompleted.filter(s=>s.date>=range.start&&s.date<=range.end) : allCompleted;

  const totalSessions=completed.length;
  const totalMinutes=completed.reduce((a,s)=>a+s.duration,0);
  const totalHours=(totalMinutes/60).toFixed(1);
  const avgDuration=totalSessions>0?Math.round(totalMinutes/totalSessions):0;

  let streak=0, d=new Date();
  while(true) {
    const k=getDateKey(d);
    if(state.sessions.some(s=>s.date===k&&s.status==="completed")) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }

  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  let chartData=[], chartLabel="", maxVal=1;

  if(period==="daily") {
    chartLabel=range.label;
    const dayKey=range.start;
    for(let h=0;h<=23;h++) {
      const mins=completed.filter(s=>{
        return s.date===dayKey && s.start_hour>=h && s.start_hour<h+1;
      }).reduce((a,s)=>a+s.duration,0);
      const isNow=range.isCurrent&&h===now.getHours();
      chartData.push({ label:h>12?(h-12)+"p":(h===0?"12a":(h===12?"12p":h+"a")), value:mins, isNow });
    }
    maxVal=Math.max(...chartData.map(c=>c.value),1);
  } else if(period==="weekly") {
    chartLabel=range.label;
    const rStart=range.start.split("-"); const weekBase=new Date(+rStart[0],+rStart[1]-1,+rStart[2]);
    for(let i=0;i<7;i++) {
      const wd=new Date(weekBase); wd.setDate(weekBase.getDate()+i);
      const dk=getDateKey(wd);
      const mins=completed.filter(s=>s.date===dk).reduce((a,s)=>a+s.duration,0);
      chartData.push({ label:dayNames[wd.getDay()], value:mins, isNow:dk===today });
    }
    maxVal=Math.max(...chartData.map(c=>c.value),1);
  } else if(period==="monthly") {
    chartLabel=range.label;
    const rStart=range.start.split("-"); const rEnd=range.end.split("-");
    const firstDay=new Date(+rStart[0],+rStart[1]-1,+rStart[2]);
    const lastDay=new Date(+rEnd[0],+rEnd[1]-1,+rEnd[2]);
    let weekStart=new Date(firstDay);
    let wk=1;
    while(weekStart<=lastDay) {
      const wEnd=new Date(weekStart); wEnd.setDate(weekStart.getDate()+6);
      const wEndClamped=wEnd>lastDay?lastDay:wEnd;
      const ws=getDateKey(weekStart), we=getDateKey(wEndClamped);
      const mins=completed.filter(s=>s.date>=ws&&s.date<=we).reduce((a,s)=>a+s.duration,0);
      const isNow=today>=ws&&today<=we;
      chartData.push({ label:"W"+wk, value:mins, isNow });
      weekStart.setDate(weekStart.getDate()+7); wk++;
    }
    maxVal=Math.max(...chartData.map(c=>c.value),1);
  } else if(period==="yearly") {
    chartLabel=range.label;
    const yr=parseInt(range.start.slice(0,4));
    for(let m=0;m<12;m++) {
      const ms=getDateKey(new Date(yr,m,1));
      const me=getDateKey(new Date(yr,m+1,0));
      const mins=completed.filter(s=>s.date>=ms&&s.date<=me).reduce((a,s)=>a+s.duration,0);
      const isNow=range.isCurrent&&m===now.getMonth();
      chartData.push({ label:monthNames[m].slice(0,3), value:mins, isNow });
    }
    maxVal=Math.max(...chartData.map(c=>c.value),1);
  } else {
    chartLabel="All Time";
    const dates=allCompleted.map(s=>s.date).sort();
    if(dates.length>0) {
      const firstYear=parseInt(dates[0].slice(0,4)), lastYear=now.getFullYear();
      for(let y=firstYear;y<=lastYear;y++) {
        const ys=y+"-01-01", ye=y+"-12-31";
        const mins=allCompleted.filter(s=>s.date>=ys&&s.date<=ye).reduce((a,s)=>a+s.duration,0);
        chartData.push({ label:String(y), value:mins, isNow:y===now.getFullYear() });
      }
    }
    maxVal=Math.max(...chartData.map(c=>c.value),1);
  }

  const streakDays=[];
  for(let i=6;i>=0;i--) {
    const sd=new Date(); sd.setDate(sd.getDate()-i);
    const dk=getDateKey(sd);
    const done=state.sessions.some(s=>s.date===dk&&s.status==="completed");
    streakDays.push({ dk, done, isToday:dk===today, day:dayNames[sd.getDay()] });
  }

  const dur25=completed.filter(s=>s.duration===25).length;
  const dur50=completed.filter(s=>s.duration===50).length;
  const dur75=completed.filter(s=>s.duration===75).length;

  const dayCounts={};
  completed.forEach(s=>{ dayCounts[s.date]=(dayCounts[s.date]||0)+1; });
  const bestDay=Object.entries(dayCounts).sort((a,b)=>b[1]-a[1])[0];

  const periods=[["daily","Daily"],["weekly","Weekly"],["monthly","Monthly"],["yearly","Yearly"],["lifetime","Lifetime"]];

  container.innerHTML = `
    <div class="stats-page">
      <div style="font-size:16px;font-weight:800;margin-bottom:10px">Your Focus Stats</div>

      <div class="stats-period-row">
        ${periods.map(([k,lbl])=>`
          <button class="stats-period-btn ${period===k?"active":""}" onclick="setStatsPeriod('${k}')">${lbl}</button>
        `).join("")}
      </div>

      ${period!=="lifetime"?`
      <div class="stats-nav-row">
        <button class="stats-nav-btn" onclick="shiftStatsPeriod(-1)">‹</button>
        <div style="display:flex;align-items:center">
          <span class="stats-nav-label">${range.label}</span>
          ${!range.isCurrent?'<button class="stats-nav-today" onclick="state.statsPeriodOffset=0;render()">Today</button>':""}
        </div>
        <button class="stats-nav-btn" onclick="shiftStatsPeriod(1)">›</button>
      </div>
      `:""}

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${totalSessions}</div>
          <div class="stat-label">Sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${totalHours}h</div>
          <div class="stat-label">Focus Time</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${streak}</div>
          <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${avgDuration}m</div>
          <div class="stat-label">Avg Session</div>
        </div>
      </div>

      ${buildTagStats(completed, totalMinutes, state.tags)}

      <div class="stat-card wide">
        <div style="font-size:12px;font-weight:700;margin-bottom:4px">Last 7 Days</div>
        <div class="streak-bar">
          ${streakDays.map(sd=>`
            <div class="streak-day ${sd.done?"done":"empty"} ${sd.isToday?"today":""}">
              <div>
                <div style="font-size:11px">${sd.done?"✓":""}</div>
                <div>${sd.day}</div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>

      <div class="stat-card wide">
        <div style="font-size:12px;font-weight:700;margin-bottom:4px">Activity</div>
        <div class="weekly-chart" style="${chartData.length>12?"overflow-x:auto;":""}">
          ${chartData.map(w=>`
            <div class="weekly-bar-col" style="${chartData.length>12?"min-width:28px":""}">
              <div class="weekly-bar-val">${w.value>0?(w.value>=60?Math.round(w.value/60)+"h":w.value+"m"):""}</div>
              <div class="weekly-bar" style="height:${w.value>0?(w.value/maxVal)*45:2}px;${w.isNow?"background:linear-gradient(180deg,var(--accent-light),var(--accent))":""}"></div>
              <div class="weekly-bar-label" style="${w.isNow?"color:var(--accent);font-weight:700":""}">${w.label}</div>
            </div>
          `).join("")}
        </div>
      </div>

      <div class="stat-card wide">
        <div style="font-size:12px;font-weight:700;margin-bottom:8px">Session Breakdown</div>
        <div style="display:flex;gap:8px">
          ${[[25,dur25,"#d98e48"],[50,dur50,"#5cb87a"],[75,dur75,"#e8a962"]].map(([d,c,col])=>`
            <div style="flex:1;text-align:center;padding:8px;border-radius:8px;background:var(--bg-surface);border:1px solid var(--border)">
              <div style="font-size:20px;font-weight:800;color:${col}">${c}</div>
              <div style="font-size:10px;color:var(--text-secondary)">${d} min</div>
            </div>
          `).join("")}
        </div>
      </div>

      ${bestDay?`
        <div class="stat-card wide" style="text-align:center">
          <div style="font-size:12px;font-weight:700">Best Day</div>
          <div style="font-size:20px;font-weight:800;margin-top:4px">${bestDay[1]} sessions</div>
          <div style="font-size:11px;color:var(--text-secondary)">${bestDay[0]}</div>
        </div>
      `:`
        <div class="stat-card wide" style="text-align:center;color:var(--text-muted)">
          <div style="font-size:13px">${period==="lifetime"?"Complete your first session to see stats!":"No sessions in this period yet"}</div>
        </div>
      `}
    </div>
  `;
}

function restoreActiveTimers() {
  state.sessions.forEach(s => {
    if(s.status === "active") {
      const msLeft = sessionEndDate(s).getTime() - Date.now();
      if(msLeft > 0) {
        sessionTimers[s.id] = setTimeout(()=> {
          const sess = state.sessions.find(x=>x.id===s.id);
          if(sess && sess.status==="active") completeSession(s.id, true);
          delete sessionTimers[s.id];
        }, msLeft);
      }
    }
  });
}

  // Get user's local timezone
  const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';

  // Loading state — show overlay and disable input/button
  aiScheduling = true;
  showAILoading(true);
  input.disabled = true;
  const sendBtn = document.getElementById('ai-send-btn');
  if (sendBtn) sendBtn.disabled = true;
  if (result) { result.className = 'ai-bar-result'; }

  try {
    // Wake up fly.io machine if it's cold (fire and forget)
    fetch(`${FLASK_URL}/health`).catch(() => {});

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);

    let res;
    try {
      res = await fetch(`${FLASK_URL}/api/schedule`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ message, timezone }),
        signal: controller.signal,
      });
    } finally {
      clearTimeout(timeoutId);
    }

    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || 'Something went wrong');

    // Add booked sessions to local state and re-render
    for (const s of data.sessions) {
      if (!state.sessions.find(x => x.id === s.id)) state.sessions.push(s);
    }
    input.value = '';
    render(); // re-render rebuilds bottom bar, result div is re-created

    // Show toast with booking summary (longer duration so user can read it)
    showToast(`✓ ${data.summary}`, 4000);


  } catch (err) {
    render();
    setTimeout(() => {
      const r = document.getElementById('ai-bar-result');
      if (r) {
        r.className = 'ai-bar-result error show';
        const msg = err.name === 'AbortError' ? 'Server is waking up — try again in a few seconds' : err.message;
        r.innerHTML = `✗ ${msg}`;
        if (aiResultTimeout) clearTimeout(aiResultTimeout);
        aiResultTimeout = setTimeout(() => { if (r) r.className = 'ai-bar-result'; }, 5000);
      }
    }, 50);
  } finally {
    aiScheduling = false;
    showAILoading(false);
    // Restore input and button after render
    setTimeout(() => {
      const inp = document.getElementById('ai-bar-input');
      if (inp) { inp.disabled = false; inp.placeholder = '⚡ schedule with AI...'; inp.focus(); }
      const btn = document.getElementById('ai-send-btn');
      if (btn) btn.disabled = false;
    }, 60);
  }
}
</script>
</body>
</html>
